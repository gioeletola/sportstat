<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SportStat — Analitica Sportiva Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07080d;--surface:#0e1018;--border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.14);--accent:#e8ff47;--accent2:#47c8ff;
  --accent3:#ff5c5c;--text:#f0f0f0;--muted:#55556a;--muted2:#22222e;
  --r:10px;--fd:'Bebas Neue',sans-serif;--fb:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:#222230;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes in{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes scan{0%{top:-1px}100%{top:100vh}}
@keyframes toastin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes countdown{from{width:100%}to{width:0%}}
.scanline{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(232,255,71,.06),transparent);animation:scan 12s linear infinite;pointer-events:none;z-index:9999}

/* ===== HEADER ===== */
header{position:sticky;top:0;z-index:500;background:rgba(7,8,13,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hdr{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:12px;height:58px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.lm{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:17px;color:#000;flex-shrink:0}
.lt{font-family:var(--fd);font-size:22px;letter-spacing:3px}.lt em{color:var(--accent);font-style:normal}
.sport-bar{display:flex;gap:3px;background:rgba(255,255,255,.04);border-radius:8px;padding:3px;flex:1;justify-content:center;flex-wrap:wrap}
.spbtn{background:none;border:none;cursor:pointer;padding:5px 12px;border-radius:5px;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--muted);transition:all .18s;white-space:nowrap}
.spbtn:hover{color:var(--text);background:rgba(255,255,255,.06)}.spbtn.on{background:var(--accent);color:#000}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lpill{display:flex;align-items:center;gap:5px;background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.2);border-radius:20px;padding:3px 10px;font-family:var(--fm);font-size:10px;color:var(--accent)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.3s infinite;box-shadow:0 0 6px var(--accent)}
.clk{font-family:var(--fm);font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:3px 8px}

/* ===== LEAGUE BAR ===== */
.league-bar{background:rgba(7,8,13,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.league-bar::-webkit-scrollbar{display:none}
.league-bar-inner{max-width:1200px;margin:0 auto;padding:6px 20px;display:flex;gap:6px;align-items:center}
.lpbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;padding:5px 14px;border-radius:20px;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--muted);transition:all .18s;white-space:nowrap}
.lpbtn:hover{color:var(--text);border-color:var(--border2)}.lpbtn.on{background:rgba(232,255,71,.12);border-color:var(--accent);color:var(--accent)}

/* ===== TICKER ===== */
.ticker{background:var(--accent);overflow:hidden;height:26px;display:flex;align-items:center}
.tlbl{font-family:var(--fd);font-size:11px;letter-spacing:2px;color:#000;padding:0 14px;background:rgba(0,0,0,.14);white-space:nowrap;height:100%;display:flex;align-items:center;flex-shrink:0}
.ttrack{display:flex;white-space:nowrap;animation:tick 50s linear infinite}.ttrack:hover{animation-play-state:paused}
.ti{font-family:var(--fm);font-size:10px;color:#000;padding:0 22px}

/* ===== SUBNAV ===== */
.subnav{border-bottom:1px solid var(--border);background:rgba(14,16,24,.8)}
.snav{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.snav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;cursor:pointer;padding:11px 16px;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.nb:hover{color:var(--text)}.nb.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,rgba(232,255,71,.04),transparent 60%);border-bottom:1px solid var(--border);padding:18px 20px}
.hero-inner{max-width:1200px;margin:0 auto;display:flex;gap:12px;flex-wrap:wrap}
.hstat{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;flex-direction:column;gap:4px}
.hstat-v{font-family:var(--fd);font-size:36px;color:var(--accent);letter-spacing:1px}
.hstat-l{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.8px}

/* ===== MAIN ===== */
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.section{animation:up .3s ease}

/* ===== CARDS / PANELS ===== */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.panel-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.panel-title{font-family:var(--fd);font-size:18px;letter-spacing:1px;color:var(--accent)}

/* ===== MATCH ROWS ===== */
.match-row{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;gap:8px}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(255,255,255,.03)}
.match-row.live{border-left:3px solid var(--accent3)}
.match-teams{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.team-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vs{font-family:var(--fm);font-size:10px;color:var(--muted);padding:0 4px}
.match-score{font-family:var(--fd);font-size:20px;letter-spacing:2px;color:var(--accent);min-width:60px;text-align:center}
.match-status{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap}
.status-live{background:rgba(255,92,92,.15);color:var(--accent3);border:1px solid rgba(255,92,92,.3);animation:pulse 1.5s infinite}
.status-sched{background:rgba(71,200,255,.08);color:var(--accent2);border:1px solid rgba(71,200,255,.2)}
.status-final{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.team-logo{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.no-logo{width:22px;height:22px;border-radius:50%;background:var(--muted2);flex-shrink:0}

/* ===== DATE GROUP ===== */
.date-grp{margin-bottom:8px}
.date-hdr{padding:8px 18px;background:rgba(255,255,255,.03);font-family:var(--fm);font-size:11px;color:var(--accent2);letter-spacing:.5px;border-bottom:1px solid var(--border)}

/* ===== STANDINGS ===== */
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{padding:8px 12px;text-align:left;font-family:var(--fm);font-size:10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.standings-table td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr:hover td{background:rgba(255,255,255,.02)}
.rank{font-family:var(--fd);font-size:16px;color:var(--muted);min-width:28px}
.rank.top{color:var(--accent)}
.form-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:10px;font-weight:700;margin-right:2px}
.fb-w{background:rgba(71,255,130,.15);color:#47ff82}
.fb-d{background:rgba(255,255,255,.08);color:var(--muted)}
.fb-l{background:rgba(255,92,92,.15);color:var(--accent3)}

/* ===== STATS ===== */
.stat-filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--border)}
.sfbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.sfbtn:hover{color:var(--text)}.sfbtn.on{background:rgba(232,255,71,.12);border-color:var(--accent);color:var(--accent)}
.stat-row{display:flex;align-items:center;padding:9px 18px;border-bottom:1px solid var(--border);gap:12px}
.stat-row:last-child{border-bottom:none}
.stat-rank{font-family:var(--fd);font-size:18px;min-width:30px;color:var(--muted)}
.stat-rank.gold{color:#ffd700}.stat-rank.silver{color:#c0c0c0}.stat-rank.bronze{color:#cd7f32}
.stat-player{flex:1;min-width:0}
.stat-name{font-size:13px;font-weight:600}
.stat-team{font-size:11px;color:var(--muted)}
.stat-val{font-family:var(--fd);font-size:22px;color:var(--accent);min-width:50px;text-align:right}
.stat-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0}

/* ===== TEAMS GRID ===== */
.teams-search{padding:12px 18px;border-bottom:1px solid var(--border)}
.teams-search input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;transition:border .15s}
.teams-search input:focus{border-color:var(--accent2)}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:16px}
.team-card{background:var(--muted2);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;transition:all .18s;cursor:pointer}
.team-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.team-card .fav-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);transition:color .15s;z-index:2}
.team-card .fav-btn:hover,.team-card .fav-btn.on{color:var(--accent)}
.tc-logo{width:52px;height:52px;object-fit:contain;margin:0 auto 10px;display:block}
.tc-name{font-family:var(--fd);font-size:16px;letter-spacing:.5px;text-align:center;margin-bottom:4px}
.tc-loc{font-size:11px;color:var(--muted);text-align:center}

/* ===== TEAM DETAIL ===== */
.team-detail{animation:up .25s ease}
.td-back{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-family:var(--fb);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.td-back:hover{color:var(--text);border-color:var(--border2)}
.td-hero{display:flex;align-items:center;gap:24px;padding:24px;background:linear-gradient(135deg,rgba(232,255,71,.04),transparent)}
.td-logo{width:80px;height:80px;object-fit:contain}
.td-info h2{font-family:var(--fd);font-size:32px;letter-spacing:1px}
.td-info p{color:var(--muted);font-size:13px}

/* ===== H2H ===== */
.h2h-search{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:16px}
.h2h-search input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-family:var(--fb);font-size:13px;color:var(--text);outline:none;width:100%;transition:border .15s}
.h2h-search input:focus{border-color:var(--accent2)}
.h2h-vs{font-family:var(--fd);font-size:20px;color:var(--accent);text-align:center}
.h2h-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin:0 16px 16px;border-radius:var(--r);overflow:hidden}
.h2h-stat{background:var(--surface);padding:14px;text-align:center}
.h2h-stat-v{font-family:var(--fd);font-size:28px;color:var(--accent)}
.h2h-stat-l{font-size:11px;color:var(--muted);margin-top:2px}
.h2h-btn{background:var(--accent);border:none;border-radius:6px;padding:9px 22px;font-family:var(--fb);font-size:13px;font-weight:700;color:#000;cursor:pointer;transition:opacity .15s}
.h2h-btn:hover{opacity:.85}

/* ===== NEWS ===== */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px}
.news-card{background:var(--muted2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .18s;display:flex;flex-direction:column}
.news-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.news-img{width:100%;height:160px;object-fit:cover;background:var(--surface)}
.news-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
.news-cat{font-family:var(--fm);font-size:9px;color:var(--accent2);text-transform:uppercase;letter-spacing:.8px}
.news-headline{font-size:14px;font-weight:700;line-height:1.4}
.news-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.news-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.news-date{font-family:var(--fm);font-size:10px;color:var(--muted)}
.news-link{font-size:11px;font-weight:600;color:var(--accent2);text-decoration:none}
.news-link:hover{text-decoration:underline}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:in .2s ease}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;animation:up .25s ease}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.08);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.14)}
.modal-teams{display:flex;align-items:center;justify-content:space-around;padding:28px 20px 16px;gap:12px}
.modal-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.modal-team-logo{width:64px;height:64px;object-fit:contain}
.modal-team-name{font-family:var(--fd);font-size:20px;text-align:center;letter-spacing:.5px}
.modal-score{font-family:var(--fd);font-size:48px;color:var(--accent);letter-spacing:4px;text-align:center}
.modal-status{text-align:center;margin-bottom:8px}
.modal-info{padding:16px 20px 20px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-info-item{background:var(--muted2);border-radius:7px;padding:10px 14px}
.modal-info-item label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.modal-info-item span{font-size:13px;font-weight:600}

/* ===== REFRESH BAR ===== */
.refresh-bar{padding:8px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:rgba(255,92,92,.04)}
.refresh-progress{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.refresh-fill{height:100%;background:var(--accent3);border-radius:2px;animation:countdown 60s linear}
.refresh-label{font-family:var(--fm);font-size:10px;color:var(--muted)}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.refresh-btn:hover{color:var(--text);border-color:var(--border2)}
.refresh-stop{color:var(--accent3);border-color:rgba(255,92,92,.3)}

/* ===== EXPORT BTN ===== */
.export-btn{background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.25);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.export-btn:hover{background:rgba(232,255,71,.14)}

/* ===== TOAST ===== */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1a1b26;border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text);pointer-events:all;animation:toastin .25s ease;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;min-width:200px}
.toast.accent{border-color:rgba(232,255,71,.3);color:var(--accent)}
.toast.info{border-color:rgba(71,200,255,.3);color:var(--accent2)}

/* ===== LOADER ===== */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--muted);font-size:13px}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.err{text-align:center;padding:32px 20px;color:var(--accent3);font-size:13px}

/* ===== UTIL BTNS ===== */
.btn-outline{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 16px;font-family:var(--fb);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.btn-outline:hover{border-color:var(--border2);background:rgba(255,255,255,.04)}
.btn-primary{background:var(--accent);border:none;border-radius:6px;padding:8px 20px;font-family:var(--fb);font-size:13px;font-weight:700;color:#000;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .hdr{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .sport-bar{order:3;width:100%}
  .hero-inner .hstat{min-width:120px}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .news-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .h2h-search{grid-template-columns:1fr;gap:8px}
  .h2h-vs{display:none}
}
@media(max-width:600px){
  .main{padding:16px 12px}
  .hdr{padding:8px 12px}
  .hero{padding:14px 12px}
  .hero-inner .hstat{min-width:100px;padding:10px 12px}
  .hstat-v{font-size:28px}
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .news-grid{grid-template-columns:1fr}
  .modal-teams{padding:18px 12px 10px;flex-wrap:wrap}
  .modal-info{grid-template-columns:1fr}
  .standings-table{font-size:11px}
  .standings-table th,.standings-table td{padding:7px 8px}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="toast-container"></div>

<!-- HEADER -->
<header>
  <div class="hdr">
    <a class="logo" href="#">
      <div class="lm">S</div>
      <div class="lt">SPORT<em>STAT</em></div>
    </a>
    <div class="sport-bar" id="sport-bar"></div>
    <div class="hdr-right">
      <div class="lpill"><div class="ldot"></div><span id="live-count">0 LIVE</span></div>
      <div class="clk" id="clock">--:--:--</div>
    </div>
  </div>
</header>

<!-- LEAGUE BAR -->
<div class="league-bar" id="league-bar">
  <div class="league-bar-inner" id="league-bar-inner"></div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="tlbl">⚡ ESPN LIVE</div>
  <div style="flex:1;overflow:hidden">
    <div class="ttrack" id="ticker-track"><span class="ti">Caricamento in corso...</span><span class="ti">Caricamento in corso...</span></div>
  </div>
</div>

<!-- SUBNAV -->
<div class="subnav">
  <div class="snav" id="subnav"></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hstat"><div class="hstat-v" id="hs-oggi">—</div><div class="hstat-l">Partite Oggi</div></div>
    <div class="hstat"><div class="hstat-v" id="hs-live">—</div><div class="hstat-l">In Corso</div></div>
    <div class="hstat"><div class="hstat-v" id="hs-lega">—</div><div class="hstat-l">Lega</div></div>
    <div class="hstat"><div class="hstat-v" id="hs-squa">—</div><div class="hstat-l">Squadre</div></div>
    <div class="hstat"><div class="hstat-v" id="hs-favs">—</div><div class="hstat-l">Preferiti ★</div></div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content"></div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal-card" id="modal-card">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';

// ===== SECURITY =====
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const safeUrl = u => { try { const p=new URL(u).protocol; return ['http:','https:'].includes(p)?u:'#'; } catch { return '#'; } };
const safeColor = c => '#' + String(c||'').replace(/[^0-9a-fA-F]/g,'').slice(0,6);

// ===== CONSTANTS =====
const BASE = 'https://site.api.espn.com/apis/site/v2/sports';
const PROXY = 'https://corsproxy.io/?';

const SPORTS = [
  {id:'calcio', label:'⚽ Calcio'},
  {id:'basket', label:'🏀 Basket'},
  {id:'nfl', label:'🏈 NFL'},
  {id:'nhl', label:'🏒 NHL'},
  {id:'mlb', label:'⚾ MLB'},
  {id:'racing', label:'🏎 Racing'}
];

const LEAGUES = {
  calcio:[
    {id:'ita.1',label:'Serie A'},{id:'ita.2',label:'Serie B'},
    {id:'eng.1',label:'Premier League'},{id:'esp.1',label:'La Liga'},
    {id:'ger.1',label:'Bundesliga'},{id:'fra.1',label:'Ligue 1'},
    {id:'ned.1',label:'Eredivisie'},{id:'por.1',label:'Primeira Liga'},
    {id:'mex.1',label:'Liga MX'},{id:'usa.1',label:'MLS'},
    {id:'uefa.champions',label:'Champions League'},{id:'uefa.europa',label:'Europa League'}
  ],
  basket:[{id:'basketball/nba',label:'NBA'},{id:'basketball/wnba',label:'WNBA'}],
  nfl:[{id:'football/nfl',label:'NFL'}],
  nhl:[{id:'hockey/nhl',label:'NHL'}],
  mlb:[{id:'baseball/mlb',label:'MLB'}],
  racing:[{id:'racing/f1',label:'Formula 1'}]
};

const SPORT_PATH = {
  calcio:'soccer', basket:'basketball', nfl:'football', nhl:'hockey', mlb:'baseball', racing:'racing'
};

const TABS = [
  {id:'risultati',label:'📡 Risultati'},
  {id:'calendario',label:'📅 Calendario'},
  {id:'classifica',label:'📊 Classifica'},
  {id:'statistiche',label:'⚡ Statistiche'},
  {id:'squadre',label:'🏆 Squadre'},
  {id:'h2h',label:'⚔️ Head-to-Head'},
  {id:'notizie',label:'📰 Notizie'}
];

// ===== STATE =====
let currentSport = 'calcio';
let currentLeague = 'ita.1';
let currentTab = 'risultati';
let C = {}; // cache keyed by url
let evMap = {};
let refreshTimer = null;
let refreshInterval = null;
let favs = [];
try { favs = JSON.parse(localStorage.getItem('ss_favs')||'[]'); } catch(e){}
let statCatIndex = 0;
let allStatCats = [];
let teamsData = [];
let teamDetailId = null;

// ===== HELPERS =====
function getLeaguePath(leagueId) {
  // For basket/nfl/nhl/mlb/racing, the league id already contains sport/league
  if(leagueId.includes('/')) return leagueId;
  // For soccer
  return `soccer/${leagueId}`;
}

function getSportFromLeague(leagueId) {
  if(leagueId.includes('/')) return leagueId.split('/')[0];
  return 'soccer';
}

async function fetchJSON(url) {
  if(C[url]) return C[url];
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    C[url] = d;
    return d;
  } catch(e) {
    try {
      const r2 = await fetch(PROXY + encodeURIComponent(url), {signal:AbortSignal.timeout(12000)});
      if(!r2.ok) throw new Error(r2.status);
      const d2 = await r2.json();
      C[url] = d2;
      return d2;
    } catch(e2) {
      throw e2;
    }
  }
}

function getApiUrl(path) {
  return `${BASE}/${path}`;
}

// ===== CLOCK =====
function startClock() {
  const el = document.getElementById('clock');
  setInterval(() => {
    el.textContent = new Date().toLocaleTimeString('it-IT');
  }, 1000);
}

// ===== TOAST =====
function showToast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),320); }, 3000);
}

// ===== FAV HELPERS =====
function isFav(id) { return favs.includes(String(id)); }
function toggleFav(id, name) {
  id = String(id);
  if(isFav(id)) {
    favs = favs.filter(f=>f!==id);
    showToast(`★ ${esc(name)} rimosso dai preferiti`);
  } else {
    favs.push(id);
    showToast(`★ ${esc(name)} aggiunto ai preferiti`, 'accent');
  }
  localStorage.setItem('ss_favs', JSON.stringify(favs));
  updateFavsCount();
}
function updateFavsCount() {
  document.getElementById('hs-favs').textContent = favs.length;
  // update fav buttons in teams view
  document.querySelectorAll('.fav-btn[data-tid]').forEach(btn=>{
    const tid = btn.dataset.tid;
    btn.classList.toggle('on', isFav(tid));
    btn.textContent = isFav(tid) ? '★' : '☆';
  });
}

// ===== SPORT / LEAGUE NAV =====
function buildSportBar() {
  const bar = document.getElementById('sport-bar');
  bar.innerHTML = SPORTS.map(s=>
    `<button class="spbtn${s.id===currentSport?' on':''}" onclick="selectSport('${s.id}')">${esc(s.label)}</button>`
  ).join('');
}

function buildLeagueBar() {
  const leagues = LEAGUES[currentSport] || [];
  const inner = document.getElementById('league-bar-inner');
  inner.innerHTML = leagues.map(l=>
    `<button class="lpbtn${l.id===currentLeague?' on':''}" onclick="selectLeague('${esc(l.id)}')">${esc(l.label)}</button>`
  ).join('');
}

function selectSport(id) {
  currentSport = id;
  currentLeague = (LEAGUES[id]||[])[0]?.id || '';
  C = {};
  clearRefresh();
  buildSportBar();
  buildLeagueBar();
  updateLeagueHero();
  loadTab(currentTab);
}

function selectLeague(id) {
  currentLeague = id;
  C = {};
  clearRefresh();
  buildLeagueBar();
  updateLeagueHero();
  loadTab(currentTab);
}

function updateLeagueHero() {
  // find league label
  const leagues = LEAGUES[currentSport]||[];
  const l = leagues.find(x=>x.id===currentLeague);
  document.getElementById('hs-lega').textContent = l ? l.label.toUpperCase() : '—';
}

// ===== SUBNAV =====
function buildSubnav() {
  const nav = document.getElementById('subnav');
  nav.innerHTML = TABS.map(t=>
    `<button class="nb${t.id===currentTab?' on':''}" onclick="selectTab('${t.id}')">${esc(t.label)}</button>`
  ).join('');
}

function selectTab(id) {
  currentTab = id;
  teamDetailId = null;
  buildSubnav();
  clearRefresh();
  loadTab(id);
}

// ===== REFRESH BAR =====
function clearRefresh() {
  if(refreshTimer) clearTimeout(refreshTimer);
  if(refreshInterval) clearInterval(refreshInterval);
  refreshTimer = null; refreshInterval = null;
}

function startAutoRefresh(cb) {
  clearRefresh();
  refreshTimer = setTimeout(()=>{ cb(); startAutoRefresh(cb); }, 60000);
}

function renderRefreshBar(cb) {
  return `<div class="refresh-bar">
    <div class="refresh-label">🔴 LIVE — aggiornamento automatico</div>
    <div class="refresh-progress"><div class="refresh-fill" id="rf-fill"></div></div>
    <button class="refresh-btn" onclick="forceRefresh()">↺ Aggiorna</button>
    <button class="refresh-btn refresh-stop" onclick="stopRefresh()">■ Stop</button>
  </div>`;
}

let _refreshCb = null;
function forceRefresh() { C={}; if(_refreshCb) _refreshCb(); }
function stopRefresh() { clearRefresh(); const rb=document.getElementById('refresh-bar-wrap'); if(rb)rb.remove(); }

// ===== MAIN CONTENT =====
const mc = () => document.getElementById('main-content');

function setContent(html) { mc().innerHTML = `<div class="section">${html}</div>`; }
function setLoader() { mc().innerHTML = `<div class="loader"><div class="spin"></div>Caricamento...</div>`; }
function setError(msg) { mc().innerHTML = `<div class="err">⚠️ ${esc(msg)}</div>`; }

async function loadTab(tab) {
  clearRefresh();
  switch(tab) {
    case 'risultati': await loadRisultati(); break;
    case 'calendario': await loadCalendario(); break;
    case 'classifica': await loadClassifica(); break;
    case 'statistiche': await loadStatistiche(); break;
    case 'squadre':
      if(teamDetailId) await loadTeamDetail(teamDetailId);
      else await loadSquadre();
      break;
    case 'h2h': loadH2H(); break;
    case 'notizie': await loadNotizie(); break;
  }
}

// ===== MATCH ROW =====
function logoImg(url, alt) {
  if(!url) return `<div class="no-logo"></div>`;
  return `<img class="team-logo" src="${safeUrl(url)}" alt="${esc(alt)}" loading="lazy" onerror="this.style.display='none'">`;
}

function matchStatusBadge(e) {
  const s = e.status?.type;
  if(!s) return '';
  const name = s.name||'';
  const detail = esc(e.status?.displayClock||e.status?.type?.shortDetail||'');
  if(name==='STATUS_IN_PROGRESS'||name==='STATUS_HALFTIME')
    return `<span class="match-status status-live">${detail||'LIVE'}</span>`;
  if(name==='STATUS_FINAL'||name==='STATUS_FULL_TIME')
    return `<span class="match-status status-final">Finale</span>`;
  // scheduled
  const dt = e.date ? new Date(e.date).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) : '';
  return `<span class="match-status status-sched">${esc(dt)}</span>`;
}

function matchScore(e) {
  const comps = e.competitions?.[0]?.competitors;
  if(!comps||comps.length<2) return '—';
  const home = comps.find(c=>c.homeAway==='home')||comps[0];
  const away = comps.find(c=>c.homeAway==='away')||comps[1];
  const hs = home.score??'';
  const as = away.score??'';
  if(hs===''&&as==='') return '–:–';
  return `${esc(String(hs))}:${esc(String(as))}`;
}

function renderMatchRow(e, i) {
  const comp = e.competitions?.[0];
  const comps = comp?.competitors||[];
  const home = comps.find(c=>c.homeAway==='home')||comps[0]||{};
  const away = comps.find(c=>c.homeAway==='away')||comps[1]||{};
  const isLive = ['STATUS_IN_PROGRESS','STATUS_HALFTIME'].includes(e.status?.type?.name);
  const eid = esc(String(e.id||i));
  evMap[e.id||i] = e;
  return `<div class="match-row${isLive?' live':''}" onclick="openMatchModal('${eid}')">
    ${logoImg(home.team?.logo, home.team?.displayName||'')}
    <div class="match-teams">
      <span class="team-name">${esc(home.team?.displayName||home.team?.name||'?')}</span>
      <span class="vs">vs</span>
      <span class="team-name">${esc(away.team?.displayName||away.team?.name||'?')}</span>
    </div>
    ${logoImg(away.team?.logo, away.team?.displayName||'')}
    <div class="match-score">${matchScore(e)}</div>
    ${matchStatusBadge(e)}
  </div>`;
}

// ===== MODAL =====
function openMatchModal(eid) {
  const e = evMap[eid];
  if(!e) return;
  const comp = e.competitions?.[0];
  const comps = comp?.competitors||[];
  const home = comps.find(c=>c.homeAway==='home')||comps[0]||{};
  const away = comps.find(c=>c.homeAway==='away')||comps[1]||{};
  const venue = comp?.venue;
  const att = comp?.attendance;
  const isLive = ['STATUS_IN_PROGRESS','STATUS_HALFTIME'].includes(e.status?.type?.name);

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="modal-teams">
      <div class="modal-team">
        <img class="modal-team-logo" src="${safeUrl(home.team?.logo||'')}" alt="${esc(home.team?.displayName||'')}" loading="lazy" onerror="this.style.display='none'">
        <div class="modal-team-name">${esc(home.team?.displayName||home.team?.name||'?')}</div>
      </div>
      <div>
        <div class="modal-score">${matchScore(e)}</div>
        <div class="modal-status">${matchStatusBadge(e)}</div>
      </div>
      <div class="modal-team">
        <img class="modal-team-logo" src="${safeUrl(away.team?.logo||'')}" alt="${esc(away.team?.displayName||'')}" loading="lazy" onerror="this.style.display='none'">
        <div class="modal-team-name">${esc(away.team?.displayName||away.team?.name||'?')}</div>
      </div>
    </div>
    <div class="modal-info">
      <div class="modal-info-item"><label>Stadio</label><span>${esc(venue?.fullName||'N/D')}</span></div>
      <div class="modal-info-item"><label>Città</label><span>${esc(venue?.address?.city||'N/D')}</span></div>
      ${att?`<div class="modal-info-item"><label>Spettatori</label><span>${Number(att).toLocaleString('it-IT')}</span></div>`:''}
      <div class="modal-info-item"><label>Data</label><span>${e.date?new Date(e.date).toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'short'}):'N/D'}</span></div>
      ${e.name?`<div class="modal-info-item" style="grid-column:1/-1"><label>Partita</label><span>${esc(e.name)}</span></div>`:''}
    </div>`;

  const ov = document.getElementById('modal-overlay');
  ov.style.display='flex';
  document.addEventListener('keydown', modalEscHandler);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display='none';
  document.removeEventListener('keydown', modalEscHandler);
}

function closeModalOnBg(ev) {
  if(ev.target.id==='modal-overlay') closeModal();
}

function modalEscHandler(ev) {
  if(ev.key==='Escape') closeModal();
}

// ===== RISULTATI =====
async function loadRisultati() {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const url = getApiUrl(`${lp}/scoreboard`);
    const data = await fetchJSON(url);
    const events = data.events||[];
    const liveEvents = events.filter(e=>['STATUS_IN_PROGRESS','STATUS_HALFTIME'].includes(e.status?.type?.name));
    const liveCount = liveEvents.length;
    document.getElementById('live-count').textContent = `${liveCount} LIVE`;
    document.getElementById('hs-live').textContent = liveCount;
    document.getElementById('hs-oggi').textContent = events.length;

    updateTicker(events);

    let html = '';
    if(liveCount>0) {
      html += `<div id="refresh-bar-wrap">${renderRefreshBar()}</div>`;
    }
    html += `<div class="panel">
      <div class="panel-hdr"><div class="panel-title">Risultati</div><span style="font-size:12px;color:var(--muted)">${events.length} partite</span></div>`;
    if(events.length===0) {
      html += `<div class="empty"><div class="empty-icon">📭</div>Nessuna partita trovata</div>`;
    } else {
      html += events.map((e,i)=>renderMatchRow(e,i)).join('');
    }
    html += `</div>`;
    setContent(html);

    if(liveCount>0) {
      _refreshCb = loadRisultati;
      startAutoRefresh(loadRisultati);
    }
  } catch(err) {
    setError('Impossibile caricare i risultati. ' + err.message);
  }
}

// ===== TICKER =====
function updateTicker(events) {
  const items = events.slice(0,20).map(e=>{
    const comp = e.competitions?.[0]?.competitors||[];
    const home = comp.find(c=>c.homeAway==='home')||comp[0]||{};
    const away = comp.find(c=>c.homeAway==='away')||comp[1]||{};
    const score = matchScore(e);
    return `${esc(home.team?.abbreviation||home.team?.shortDisplayName||'H')} ${score} ${esc(away.team?.abbreviation||away.team?.shortDisplayName||'A')}`;
  });
  if(items.length===0) return;
  const txt = items.join('  •  ');
  const track = document.getElementById('ticker-track');
  const html = `<span class="ti">${txt}</span><span class="ti">${txt}</span>`;
  track.innerHTML = html;
}

// ===== CALENDARIO =====
async function loadCalendario() {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    // Fetch 7 days: today + 6
    const today = new Date();
    const promises = [];
    for(let i=0;i<7;i++) {
      const d = new Date(today);
      d.setDate(today.getDate()+i);
      const ds = d.toISOString().slice(0,10).replace(/-/g,'');
      promises.push(fetchJSON(getApiUrl(`${lp}/scoreboard?dates=${ds}`)).catch(()=>({events:[]})));
    }
    const results = await Promise.all(promises);
    let html = `<div class="panel">
      <div class="panel-hdr"><div class="panel-title">Calendario — prossimi 7 giorni</div></div>`;
    let total = 0;
    results.forEach((data,i)=>{
      const events = data.events||[];
      total += events.length;
      if(events.length===0) return;
      const d = new Date(today);
      d.setDate(today.getDate()+i);
      const label = i===0 ? 'Oggi — ' : i===1 ? 'Domani — ' : '';
      const dateStr = label + d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
      html += `<div class="date-grp"><div class="date-hdr">${esc(dateStr.toUpperCase())}</div>`;
      html += events.map((e,j)=>renderMatchRow(e,`c${i}_${j}`)).join('');
      html += `</div>`;
    });
    if(total===0) {
      html += `<div class="empty"><div class="empty-icon">📭</div>Nessuna partita in programma</div>`;
    }
    html += `</div>`;
    setContent(html);
  } catch(err) {
    setError('Impossibile caricare il calendario. ' + err.message);
  }
}

// ===== CLASSIFICA =====
async function loadClassifica() {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const data = await fetchJSON(getApiUrl(`${lp}/standings`));
    const groups = data.standings?.entries ? [data.standings] : (data.children||[]);

    const leagues = LEAGUES[currentSport]||[];
    const leagueLabel = (leagues.find(x=>x.id===currentLeague)||{}).label||currentLeague;
    const dateStr = new Date().toISOString().slice(0,10);

    let html = `<div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">Classifica</div>
        <button class="export-btn" onclick="exportStandings()">⬇ Esporta CSV</button>
      </div>`;

    let tableData = [];

    if(groups.length===0 && data.standings?.entries) {
      groups.push(data.standings);
    }

    const renderGroup = (grp) => {
      const entries = grp.entries||[];
      let cols = [];
      if(entries[0]?.stats) {
        cols = entries[0].stats.map(s=>s.shortDisplayName||s.name||'');
      }
      tableData = entries;
      let t = `<div style="overflow-x:auto"><table class="standings-table">
        <thead><tr>
          <th>#</th><th>Squadra</th>
          ${cols.map(c=>`<th>${esc(c)}</th>`).join('')}
        </tr></thead><tbody>`;
      entries.forEach((en,idx)=>{
        const teamName = en.team?.displayName||en.team?.name||'';
        const logo = en.team?.logos?.[0]?.href||en.team?.logo||'';
        const rankClass = idx<4?'rank top':'rank';
        t += `<tr>
          <td><span class="${rankClass}">${idx+1}</span></td>
          <td><div style="display:flex;align-items:center;gap:8px">
            ${logo?`<img src="${safeUrl(logo)}" style="width:18px;height:18px;object-fit:contain" loading="lazy" onerror="this.style.display='none'">`:''}
            <span style="font-weight:600">${esc(teamName)}</span>
          </div></td>
          ${(en.stats||[]).map(s=>`<td>${esc(String(s.displayValue||s.value??''))}</td>`).join('')}
        </tr>`;
      });
      t += `</tbody></table></div>`;
      return t;
    };

    if(groups.length>0) {
      groups.forEach(grp=>{
        if(grp.name) html += `<div style="padding:8px 18px;font-size:11px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${esc(grp.name)}</div>`;
        html += renderGroup(grp);
      });
    } else if(data.entries) {
      tableData = data.entries;
      html += renderGroup({entries:data.entries});
    } else {
      html += `<div class="empty"><div class="empty-icon">📊</div>Classifica non disponibile</div>`;
    }
    html += `</div>`;

    // Store for CSV export
    window._standingsData = {entries:tableData, league:leagueLabel, date:dateStr};
    setContent(html);
    document.getElementById('hs-squa').textContent = tableData.length || '—';
  } catch(err) {
    setError('Impossibile caricare la classifica. ' + err.message);
  }
}

function exportStandings() {
  const sd = window._standingsData;
  if(!sd||!sd.entries||sd.entries.length===0) { showToast('Nessun dato da esportare','info'); return; }
  const entries = sd.entries;
  const cols = entries[0]?.stats?.map(s=>s.shortDisplayName||s.name||'')||[];
  let csv = '#,Squadra,' + cols.join(',') + '\n';
  entries.forEach((en,i)=>{
    const name = (en.team?.displayName||en.team?.name||'').replace(/,/g,' ');
    const stats = (en.stats||[]).map(s=>(s.displayValue||s.value??'').toString().replace(/,/g,'')).join(',');
    csv += `${i+1},${name},${stats}\n`;
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `classifica-${(sd.league||'lega').replace(/\s+/g,'-').toLowerCase()}-${sd.date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📄 CSV esportato con successo!','accent');
}

// ===== STATISTICHE =====
async function loadStatistiche(catIdx) {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const data = await fetchJSON(getApiUrl(`${lp}/leaders`));
    const cats = data.categories||[];
    if(catIdx===undefined) catIdx=0;
    allStatCats = cats;
    statCatIndex = catIdx;

    let html = `<div class="panel">
      <div class="panel-hdr"><div class="panel-title">Statistiche Giocatori</div></div>
      <div class="stat-filter-bar">
        ${cats.map((c,i)=>`<button class="sfbtn${i===catIdx?' on':''}" onclick="loadStatistiche(${i})">${esc(c.displayName||c.name||'Cat '+(i+1))}</button>`).join('')}
      </div>`;

    if(cats.length===0) {
      html += `<div class="empty"><div class="empty-icon">⚡</div>Statistiche non disponibili</div>`;
    } else {
      const cat = cats[catIdx];
      const leaders = cat.leaders||[];
      const top = leaders.slice(0,10);
      top.forEach((l,i)=>{
        const ath = l.athlete||{};
        const team = l.team||ath.team||{};
        const logo = team.logos?.[0]?.href||team.logo||'';
        const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        html += `<div class="stat-row">
          <div class="stat-rank ${rankClass}">${i+1}</div>
          ${logo?`<img class="stat-logo" src="${safeUrl(logo)}" loading="lazy" onerror="this.style.display='none'">`:''}
          <div class="stat-player">
            <div class="stat-name">${esc(ath.displayName||ath.fullName||'?')}</div>
            <div class="stat-team">${esc(team.displayName||team.name||'')}</div>
          </div>
          <div class="stat-val">${esc(String(l.displayValue||l.value??''))}</div>
        </div>`;
      });
      if(top.length===0) html += `<div class="empty"><div class="empty-icon">⚡</div>Nessun dato disponibile</div>`;
    }
    html += `</div>`;
    setContent(html);
  } catch(err) {
    setError('Impossibile caricare le statistiche. ' + err.message);
  }
}

// ===== SQUADRE =====
async function loadSquadre() {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const data = await fetchJSON(getApiUrl(`${lp}/teams?limit=100`));
    const sports = data.sports||[];
    let teams = [];
    sports.forEach(sp=>(sp.leagues||[]).forEach(l=>(l.teams||[]).forEach(t=>{if(t.team)teams.push(t.team)})));
    if(teams.length===0) teams = (data.teams||[]).map(t=>t.team||t);
    if(teams.length===0 && data.items) teams = data.items;
    teamsData = teams;
    document.getElementById('hs-squa').textContent = teams.length;

    let html = `<div class="panel">
      <div class="panel-hdr"><div class="panel-title">Squadre</div><span style="font-size:12px;color:var(--muted)">${teams.length} squadre</span></div>
      <div class="teams-search"><input type="text" id="team-search" placeholder="🔍  Cerca squadra..." oninput="filterTeams()" autocomplete="off"></div>
      <div class="teams-grid" id="teams-grid">
        ${teams.map(t=>renderTeamCard(t)).join('')}
      </div>
    </div>`;
    setContent(html);
  } catch(err) {
    setError('Impossibile caricare le squadre. ' + err.message);
  }
}

function renderTeamCard(t) {
  const logo = t.logos?.[0]?.href||t.logo||'';
  const tid = esc(String(t.id||''));
  const name = esc(t.displayName||t.name||'?');
  const loc = esc(t.location||t.abbreviation||'');
  return `<div class="team-card" onclick="openTeamDetail('${tid}')">
    <button class="fav-btn ${isFav(t.id)?'on':''}" data-tid="${tid}" onclick="event.stopPropagation();toggleFav('${tid}','${name}')">${isFav(t.id)?'★':'☆'}</button>
    ${logo?`<img class="tc-logo" src="${safeUrl(logo)}" loading="lazy" onerror="this.style.display='none'">`:'<div style="width:52px;height:52px;margin:0 auto 10px;background:var(--muted2);border-radius:50%"></div>'}
    <div class="tc-name">${name}</div>
    <div class="tc-loc">${loc}</div>
  </div>`;
}

function filterTeams() {
  const q = document.getElementById('team-search').value.toLowerCase();
  const grid = document.getElementById('teams-grid');
  if(!grid) return;
  grid.innerHTML = teamsData
    .filter(t=>(t.displayName||t.name||'').toLowerCase().includes(q)||(t.location||'').toLowerCase().includes(q))
    .map(t=>renderTeamCard(t)).join('');
}

async function openTeamDetail(tid) {
  teamDetailId = tid;
  await loadTeamDetail(tid);
}

async function loadTeamDetail(tid) {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const tdata = await fetchJSON(getApiUrl(`${lp}/teams/${tid}`));
    const team = tdata.team||{};
    const logo = team.logos?.[0]?.href||team.logo||'';
    const name = team.displayName||team.name||'?';
    const loc = team.location||'';
    const abbr = team.abbreviation||'';
    const color = team.color ? safeColor(team.color) : '07080d';

    // Fetch recent results
    let results = [];
    try {
      const rd = await fetchJSON(getApiUrl(`${lp}/teams/${tid}/schedule?limit=10`));
      results = (rd.events||[]).filter(e=>e.status?.type?.completed).slice(-6).reverse();
    } catch(e2){}

    let formHtml = '';
    if(results.length>0) {
      formHtml = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">';
      results.forEach(ev=>{
        const comps = ev.competitions?.[0]?.competitors||[];
        const mine = comps.find(c=>c.team?.id===tid)||comps[0]||{};
        const opp = comps.find(c=>c.team?.id!==tid)||comps[1]||{};
        const ms = mine.score??'', os = opp.score??'';
        let res = 'D';
        if(ms!==''&&os!=='') {
          const mn=Number(ms),on=Number(os);
          if(mn>on) res='V'; else if(mn<on) res='S';
        }
        const oppName = opp.team?.abbreviation||opp.team?.shortDisplayName||'?';
        const cls = res==='V'?'fb-w':res==='S'?'fb-l':'fb-d';
        formHtml += `<span class="form-badge ${cls}" title="${esc(oppName)} ${esc(String(ms))}:${esc(String(os))}">${res}</span>`;
      });
      formHtml += '</div>';
    }

    let html = `<div class="team-detail">
      <div class="panel-hdr">
        <button class="td-back" onclick="goBackToTeams()">← Indietro</button>
        <button class="fav-btn ${isFav(tid)?'on':''}" data-tid="${esc(tid)}" onclick="toggleFav('${esc(tid)}','${esc(name)}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:14px;color:${isFav(tid)?'var(--accent)':'var(--muted)'}">${isFav(tid)?'★ Preferito':'☆ Aggiungi'}</button>
      </div>
      <div class="td-hero" style="background:linear-gradient(135deg,#${color}22,transparent)">
        ${logo?`<img class="td-logo" src="${safeUrl(logo)}" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="td-info">
          <h2>${esc(name)}</h2>
          <p>${esc(loc)}${abbr?' ('+abbr+')':''}</p>
          ${formHtml ? `<div style="margin-top:6px"><span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Ultimi risultati:</span>${formHtml}</div>` : ''}
        </div>
      </div>`;

    // Recent matches list
    if(results.length>0) {
      html += `<div class="panel-hdr" style="border-top:1px solid var(--border)"><div class="panel-title">Ultime partite</div></div>`;
      results.forEach((ev,i)=>{ html += renderMatchRow(ev, `td_${i}`); });
    }
    html += `</div>`;
    setContent(html);
  } catch(err) {
    setError('Impossibile caricare i dettagli squadra. ' + err.message);
  }
}

function goBackToTeams() {
  teamDetailId = null;
  loadSquadre();
}

// ===== HEAD-TO-HEAD =====
function loadH2H() {
  setContent(`<div class="panel">
    <div class="panel-hdr"><div class="panel-title">Head-to-Head</div></div>
    <div class="h2h-search">
      <input type="text" id="h2h-a" placeholder="Squadra A (nome o ID)" autocomplete="off">
      <div class="h2h-vs">VS</div>
      <input type="text" id="h2h-b" placeholder="Squadra B (nome o ID)" autocomplete="off">
    </div>
    <div style="padding:0 16px 16px;display:flex;gap:10px;align-items:center">
      <button class="h2h-btn" onclick="runH2H()">🔍 Cerca H2H</button>
      <span style="font-size:11px;color:var(--muted)">Inserisci i nomi o ID delle squadre</span>
    </div>
    <div id="h2h-result"></div>
  </div>`);
}

async function runH2H() {
  const a = document.getElementById('h2h-a')?.value.trim();
  const b = document.getElementById('h2h-b')?.value.trim();
  const res = document.getElementById('h2h-result');
  if(!a||!b) { if(res) res.innerHTML=`<div class="err">Inserisci entrambe le squadre</div>`; return; }
  if(res) res.innerHTML=`<div class="loader"><div class="spin"></div>Ricerca in corso...</div>`;

  try {
    // Find team IDs from teamsData or use directly
    const findTeam = (q) => {
      const ql = q.toLowerCase();
      return teamsData.find(t=>(t.displayName||t.name||'').toLowerCase().includes(ql)||(t.id===q));
    };
    const teamA = findTeam(a);
    const teamB = findTeam(b);

    if(!teamA||!teamB) {
      if(res) res.innerHTML=`<div class="err">Squadre non trovate. Prova con ID numerici o vai su Squadre per trovarli.</div>`;
      return;
    }

    // Fetch schedules for both teams and find common opponents
    const lp = getLeaguePath(currentLeague);
    const [sdA, sdB] = await Promise.all([
      fetchJSON(getApiUrl(`${lp}/teams/${teamA.id}/schedule?limit=50`)).catch(()=>({events:[]})),
      fetchJSON(getApiUrl(`${lp}/teams/${teamB.id}/schedule?limit=50`)).catch(()=>({events:[]}))
    ]);

    // Find matches where both teams played against each other
    const eventsA = (sdA.events||[]);
    const h2hMatches = eventsA.filter(ev=>{
      const comps = ev.competitions?.[0]?.competitors||[];
      return comps.some(c=>c.team?.id===teamA.id) && comps.some(c=>c.team?.id===teamB.id);
    }).filter(ev=>ev.status?.type?.completed);

    // Calculate stats
    let goalsA=0, goalsB=0, winsA=0, winsB=0, draws=0;
    h2hMatches.forEach(ev=>{
      const comps = ev.competitions?.[0]?.competitors||[];
      const cA = comps.find(c=>c.team?.id===teamA.id)||{};
      const cB = comps.find(c=>c.team?.id===teamB.id)||{};
      const sA=Number(cA.score??0), sB=Number(cB.score??0);
      goalsA+=sA; goalsB+=sB;
      if(sA>sB) winsA++; else if(sB>sA) winsB++; else draws++;
    });

    let html = '';
    if(h2hMatches.length>0) {
      html += `<div class="h2h-stats">
        <div class="h2h-stat"><div class="h2h-stat-v">${goalsA}</div><div class="h2h-stat-l">Gol ${esc(teamA.abbreviation||teamA.shortDisplayName||'A')}</div></div>
        <div class="h2h-stat" style="background:var(--muted2)">
          <div class="h2h-stat-v">${winsA}–${draws}–${winsB}</div>
          <div class="h2h-stat-l">${h2hMatches.length} partite totali</div>
        </div>
        <div class="h2h-stat"><div class="h2h-stat-v">${goalsB}</div><div class="h2h-stat-l">Gol ${esc(teamB.abbreviation||teamB.shortDisplayName||'B')}</div></div>
      </div>`;
      h2hMatches.forEach((ev,i)=>{ html += renderMatchRow(ev, `h2h_${i}`); });
    } else {
      html = `<div class="empty"><div class="empty-icon">⚔️</div>Nessun incontro diretto trovato nel database</div>`;
    }
    if(res) res.innerHTML = html;
  } catch(err) {
    if(res) res.innerHTML=`<div class="err">Errore nella ricerca H2H: ${esc(err.message)}</div>`;
  }
}

// ===== NOTIZIE =====
async function loadNotizie() {
  setLoader();
  try {
    const lp = getLeaguePath(currentLeague);
    const sportPath = getSportFromLeague(currentLeague);
    let data;
    try {
      data = await fetchJSON(getApiUrl(`${lp}/news?limit=20`));
    } catch(e) {
      data = await fetchJSON(getApiUrl(`${sportPath}/news?limit=20`));
    }
    const articles = data.articles||[];

    let html = `<div class="panel">
      <div class="panel-hdr"><div class="panel-title">Notizie</div><span style="font-size:12px;color:var(--muted)">${articles.length} articoli</span></div>
      <div class="news-grid">`;

    if(articles.length===0) {
      html += `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📰</div>Nessuna notizia disponibile</div>`;
    }
    articles.forEach(art=>{
      const img = art.images?.[0]?.url||art.image||'';
      const cat = art.categories?.[0]?.description||art.type||'';
      const link = art.links?.web?.href||art.link||'#';
      const desc = (art.description||art.summary||'').slice(0,140);
      const dateStr = art.published ? new Date(art.published).toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'}) : '';
      html += `<div class="news-card">
        ${img?`<img class="news-img" src="${safeUrl(img)}" loading="lazy" onerror="this.parentElement.querySelector('.news-img').remove()" alt="${esc(art.headline||'')}">`:''}
        <div class="news-body">
          ${cat?`<div class="news-cat">${esc(cat)}</div>`:''}
          <div class="news-headline">${esc(art.headline||art.title||'')}</div>
          ${desc?`<div class="news-desc">${esc(desc)}${desc.length>=140?'…':''}</div>`:''}
          <div class="news-meta">
            <span class="news-date">${esc(dateStr)}</span>
            <a class="news-link" href="${safeUrl(link)}" target="_blank" rel="noopener noreferrer">Leggi →</a>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    setContent(html);
  } catch(err) {
    setError('Impossibile caricare le notizie. ' + err.message);
  }
}
